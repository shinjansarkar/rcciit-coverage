name: Keep Supabase Project Alive

on:
  schedule:
    - cron: "0 0 * * 0"  # Runs every Sunday at 12 AM UTC
  workflow_dispatch:      # Allow manual trigger too

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase project
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" "https://mbphlqwporwbctzwjthh.supabase.co" || echo "Ping failed"
